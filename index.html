
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UO Forum Archive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#d0d0d8;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;line-height:1.6}
a{color:#7db8f0;text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:linear-gradient(135deg,#1a1a3e,#0d0d1a);border-bottom:2px solid #c4a35a;padding:20px;text-align:center}
.hdr h1{color:#c4a35a;font-size:28px;font-weight:400;letter-spacing:2px}
.hdr .sub{color:#808090;font-size:14px;margin-top:4px}
.ctl{max-width:1100px;margin:20px auto;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.ctl input,.ctl select{background:#1a1a2e;border:1px solid #2a2a4e;color:#d0d0d8;padding:10px 14px;border-radius:6px;font-size:14px}
.ctl input{flex:1;min-width:200px}.ctl select{min-width:180px}
.ctl input:focus,.ctl select:focus{outline:none;border-color:#c4a35a}
.vtog{display:flex;gap:0;margin-left:auto}
.vtog button{background:#1a1a2e;border:1px solid #2a2a4e;color:#707088;padding:8px 14px;font-size:18px;cursor:pointer;transition:background .2s,color .2s}
.vtog button:first-child{border-radius:6px 0 0 6px}.vtog button:last-child{border-radius:0 6px 6px 0;border-left:none}
.vtog button.on{background:#c4a35a;color:#0d0d1a;border-color:#c4a35a}
.st{max-width:1100px;margin:0 auto;padding:0 20px;font-size:13px;color:#505068;margin-bottom:12px}

/* list view */
.tl{max-width:1100px;margin:0 auto;padding:0 20px 40px}
.ti{background:#16213e;border:1px solid #1e2a4a;border-radius:8px;padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s;display:flex;justify-content:space-between;align-items:center}
.ti:hover{border-color:#c4a35a;background:#1a2848}
.tt{font-size:16px;color:#e0e0e8;font-weight:500}
.tm{font-size:12px;color:#707088;margin-top:4px}.tm span{margin-right:16px}
.tp{background:#0d0d1a;color:#c4a35a;padding:4px 12px;border-radius:12px;font-size:13px;white-space:nowrap}

/* gallery view */
.grid{max-width:1100px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:#16213e;border:1px solid #1e2a4a;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
.card:hover{border-color:#c4a35a;transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card-thumb{width:100%;height:180px;background:#0d0d1a;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb .no-img{color:#2a2a4e;font-size:48px}
.card-body{padding:14px 16px}
.card-title{font-size:15px;font-weight:600;color:#e0e0e8;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:12px;color:#707088;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.card-meta .cat{color:#c4a35a}
.card-meta .posts{background:#0d0d1a;color:#c4a35a;padding:2px 8px;border-radius:10px;font-size:11px}

/* thread detail */
.tv{max-width:900px;margin:0 auto;padding:0 20px 40px}
.bb{display:inline-flex;align-items:center;gap:6px;background:#16213e;border:1px solid #2a2a4e;color:#c4a35a;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:16px;transition:background .2s}
.bb:hover{background:#1e2a4a;text-decoration:none}
.tvh{font-size:24px;color:#c4a35a;margin-bottom:4px}
.tvc{color:#707088;font-size:14px;margin-bottom:24px}
.post{background:#16213e;border:1px solid #1e2a4a;border-radius:8px;margin-bottom:12px;overflow:hidden}
.post.op{border-left:3px solid #c4a35a}
.ph{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#12192e;border-bottom:1px solid #1e2a4a}
.pa{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#0d0d1a}
.pan{font-weight:600;color:#e0e0e8}
.pad{font-size:12px;color:#606078}
.pb{padding:16px;font-size:15px;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word}
.pb img{max-width:100%;height:auto;border-radius:4px;margin:8px 0}
.pb blockquote,.pb .Quote{background:#0d0d1a;border-left:3px solid #c4a35a;padding:12px 16px;margin:8px 0;border-radius:0 6px 6px 0}
.pb .QuoteAuthor{color:#c4a35a;font-size:13px;margin-bottom:4px}
.ps{padding:8px 16px;border-top:1px solid #1e2a4a;font-size:12px;color:#505068;font-style:italic}

.ld{text-align:center;padding:60px;color:#505068;font-size:18px}
.nr{text-align:center;padding:40px;color:#505068}
.lb{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:1000;cursor:pointer;justify-content:center;align-items:center}
.lb.on{display:flex}.lb img{max-width:95%;max-height:95%;object-fit:contain}
.pager{max-width:1100px;margin:0 auto;padding:20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pager button{background:#16213e;border:1px solid #2a2a4e;color:#d0d0d8;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s,border-color .2s}
.pager button:hover{border-color:#c4a35a;background:#1a2848}
.pager button.active{background:#c4a35a;color:#0d0d1a;border-color:#c4a35a;font-weight:600}
</style>
</head>
<body>
<div class="hdr">
<h1>&#9876; Ultima Online Forum Archive &#9876;</h1>
<div class="sub">A complete archive of forum.uo.com discussions</div>
</div>
<div id="app"><div class="ld">Loading archive&hellip;</div></div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbi" src=""></div>
<script src="alldata_1.js"></script>
<script src="alldata_2.js"></script>
<script>
if(typeof ALL_THREADS_1==='undefined'||typeof ALL_THREADS_2==='undefined'){
 document.getElementById('app').innerHTML='<div class="ld">alldata files not found.<br><br>Run the scraper first, then open index.html.</div>';
}else{
const ALL_THREADS=ALL_THREADS_1.concat(ALL_THREADS_2);
const DB={};ALL_THREADS.forEach(t=>{DB[t.discussionId]=t});
const M=ALL_THREADS.map(t=>{
 let thumb='';
 if(t.posts&&t.posts.length>0){const op=t.posts[0];if(op.imageUrls&&op.imageUrls.length>0){const fn=op.imageUrls[0].split('/').pop().split('?')[0];thumb='images/'+fn}}
 return{id:t.discussionId,title:t.title,category:t.category,author:t.opAuthor||'',date:t.opDate||'',postCount:t.postCount,thumb:thumb};
});
M.sort((a,b)=>b.id-a.id);
const PER_PAGE=60;let curPage=1,filtered=M,mode=localStorage.getItem('viewMode')||'list';

showBrowse();

function showBrowse(){
 const cats=[...new Set(M.map(t=>t.category))].sort();
 let h='<div class="ctl">';
 h+='<input id="q" placeholder="Search threads\u2026" oninput="fil()">';
 h+='<select id="cf" onchange="fil()"><option value="">All Categories</option>';
 cats.forEach(c=>{h+='<option value="'+esc(c)+'">'+esc(c)+'</option>'});
 h+='</select>';
 h+='<div class="vtog"><button id="btn-list" onclick="setMode(\'list\')" title="List view">&#9776;</button>';
 h+='<button id="btn-grid" onclick="setMode(\'grid\')" title="Gallery view">&#9638;</button></div>';
 h+='</div>';
 h+='<div class="st" id="st">'+filtered.length+' threads</div>';
 h+='<div id="tc"></div><div class="pager" id="pager"></div>';
 document.getElementById('app').innerHTML=h;
 updateToggle();renderPage();
 window.showBrowse=showBrowse;window.fil=fil;window.vt=vt;window.goPage=goPage;window.setMode=setMode;
}

function setMode(m){mode=m;localStorage.setItem('viewMode',m);curPage=1;updateToggle();renderPage()}
function updateToggle(){
 document.getElementById('btn-list').className=mode==='list'?'on':'';
 document.getElementById('btn-grid').className=mode==='grid'?'on':'';
}

function renderPage(){
 const s=(curPage-1)*PER_PAGE,slice=filtered.slice(s,s+PER_PAGE);
 document.getElementById('tc').innerHTML=mode==='grid'?gridItems(slice):listItems(slice);
 renderPager();
}

function listItems(list){
 if(!list.length)return'<div class="nr">No threads match.</div>';
 let h='<div class="tl">';
 list.forEach(t=>{
  h+='<div class="ti" onclick="vt('+t.id+')">';
  h+='<div><div class="tt">'+esc(t.title)+'</div>';
  h+='<div class="tm"><span>by '+esc(t.author)+'</span><span>'+esc(t.category)+'</span><span>'+esc(t.date)+'</span></div></div>';
  h+='<div class="tp">'+t.postCount+' posts</div></div>';
 });
 h+='</div>';return h;
}

function gridItems(list){
 if(!list.length)return'<div class="nr">No threads match.</div>';
 let h='<div class="grid">';
 list.forEach(t=>{
  h+='<div class="card" onclick="vt('+t.id+')">';
  h+='<div class="card-thumb">';
  if(t.thumb)h+='<img src="'+t.thumb+'" onerror="this.parentElement.innerHTML=\'<div class=no-img>&#9876;</div>\'" loading="lazy">';
  else h+='<div class="no-img">&#9876;</div>';
  h+='</div><div class="card-body">';
  h+='<div class="card-title">'+esc(t.title)+'</div>';
  h+='<div class="card-meta"><span>'+esc(t.author)+'</span><span class="cat">'+esc(t.category)+'</span><span>'+esc(t.date)+'</span><span class="posts">'+t.postCount+' posts</span></div></div></div>';
 });
 h+='</div>';return h;
}

function renderPager(){
 const tot=Math.ceil(filtered.length/PER_PAGE);if(tot<=1){document.getElementById('pager').innerHTML='';return}
 let h='';
 if(curPage>1)h+='<button onclick="goPage('+(curPage-1)+')">&#9664; Prev</button>';
 let a=Math.max(1,curPage-4),b=Math.min(tot,curPage+4);
 if(a>1)h+='<button onclick="goPage(1)">1</button>';
 if(a>2)h+='<button disabled>&hellip;</button>';
 for(let i=a;i<=b;i++)h+='<button class="'+(i===curPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
 if(b<tot-1)h+='<button disabled>&hellip;</button>';
 if(b<tot)h+='<button onclick="goPage('+tot+')">'+tot+'</button>';
 if(curPage<tot)h+='<button onclick="goPage('+(curPage+1)+')">Next &#9654;</button>';
 document.getElementById('pager').innerHTML=h;
}
function goPage(p){curPage=p;renderPage();window.scrollTo(0,0)}

function fil(){
 const q=document.getElementById('q').value.toLowerCase(),c=document.getElementById('cf').value;
 filtered=M.filter(t=>{if(c&&t.category!==c)return false;if(q&&!t.title.toLowerCase().includes(q)&&!t.author.toLowerCase().includes(q))return false;return true});
 curPage=1;document.getElementById('st').textContent=filtered.length+' of '+M.length+' threads';renderPage();
}

function vt(id){
 const t=DB[id];if(!t){document.getElementById('app').innerHTML='<div class="ld">Thread '+id+' not found</div>';return}
 let h='<div class="tv">';
 h+='<a class="bb" onclick="showBrowse()">&#8592; Back</a>';
 h+='<h2 class="tvh">'+esc(t.title)+'</h2>';
 h+='<div class="tvc">'+esc(t.category)+' &middot; '+t.postCount+' posts</div>';
 t.posts.forEach(p=>{
  const av=loc(p.avatarUrl),msg=locAll(p.messageHtml||'');
  h+='<div class="post'+(p.isOriginalPost?' op':'')+'">';
  h+='<div class="ph"><img class="pa" src="'+av+'" onerror="this.style.display=\'none\'">';
  h+='<div><div class="pan">'+esc(p.author)+'</div><div class="pad">'+esc(p.datetime||p.displayDate)+'</div></div></div>';
  h+='<div class="pb">'+msg+'</div>';
  if(p.signature)h+='<div class="ps">'+esc(p.signature)+'</div>';
  h+='</div>';
 });
 h+='</div>';
 document.getElementById('app').innerHTML=h;
 document.querySelectorAll('.pb img').forEach(i=>{i.style.cursor='pointer';i.onclick=()=>{document.getElementById('lbi').src=i.src;document.getElementById('lb').classList.add('on')}});
 window.scrollTo(0,0);
}

function locAll(html){return html.replace(/src="([^"]+)"/g,(_,u)=>{const fn=u.split('/').pop().split('?')[0];return'src="images/'+fn+'"'})}
function loc(u){if(!u)return'';const fn=u.split('/').pop().split('?')[0];return'images/'+fn}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
}
</script>
</body>
</html>
