<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UO Forum Archive – Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#d0d0d8;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;line-height:1.6}
a{color:#7db8f0;text-decoration:none}a:hover{text-decoration:underline}
.hdr{background:linear-gradient(135deg,#1a1a3e,#0d0d1a);border-bottom:2px solid #c4a35a;padding:20px;text-align:center}
.hdr h1{color:#c4a35a;font-size:28px;font-weight:400;letter-spacing:2px}
.hdr .sub{color:#808090;font-size:14px;margin-top:4px}
.nav{text-align:center;padding:10px;background:#12192e;border-bottom:1px solid #1e2a4a;font-size:13px}
.nav a{color:#7db8f0;margin:0 12px}
.ctl{max-width:1100px;margin:20px auto;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap}
.ctl input,.ctl select{background:#1a1a2e;border:1px solid #2a2a4e;color:#d0d0d8;padding:10px 14px;border-radius:6px;font-size:14px}
.ctl input{flex:1;min-width:200px}.ctl select{min-width:180px}
.ctl input:focus,.ctl select:focus{outline:none;border-color:#c4a35a}
.st{max-width:1100px;margin:0 auto;padding:0 20px;font-size:13px;color:#505068;margin-bottom:12px}

/* card grid */
.grid{max-width:1100px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:#16213e;border:1px solid #1e2a4a;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s}
.card:hover{border-color:#c4a35a;transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card-thumb{width:100%;height:180px;background:#0d0d1a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb .no-img{color:#2a2a4e;font-size:48px}
.card-body{padding:14px 16px}
.card-title{font-size:15px;font-weight:600;color:#e0e0e8;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:12px;color:#707088;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.card-meta .cat{color:#c4a35a}
.card-meta .posts{background:#0d0d1a;color:#c4a35a;padding:2px 8px;border-radius:10px;font-size:11px}

/* thread detail view */
.tv{max-width:900px;margin:0 auto;padding:0 20px 40px}
.bb{display:inline-flex;align-items:center;gap:6px;background:#16213e;border:1px solid #2a2a4e;color:#c4a35a;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:16px;transition:background .2s}
.bb:hover{background:#1e2a4a;text-decoration:none}
.tvh{font-size:24px;color:#c4a35a;margin-bottom:4px}
.tvc{color:#707088;font-size:14px;margin-bottom:24px}
.post{background:#16213e;border:1px solid #1e2a4a;border-radius:8px;margin-bottom:12px;overflow:hidden}
.post.op{border-left:3px solid #c4a35a}
.ph{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#12192e;border-bottom:1px solid #1e2a4a}
.pa{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#0d0d1a}
.pan{font-weight:600;color:#e0e0e8}
.pad{font-size:12px;color:#606078}
.pb{padding:16px;font-size:15px;line-height:1.7;word-wrap:break-word;overflow-wrap:break-word}
.pb img{max-width:100%;height:auto;border-radius:4px;margin:8px 0}
.pb blockquote,.pb .Quote{background:#0d0d1a;border-left:3px solid #c4a35a;padding:12px 16px;margin:8px 0;border-radius:0 6px 6px 0}
.pb .QuoteAuthor{color:#c4a35a;font-size:13px;margin-bottom:4px}
.ps{padding:8px 16px;border-top:1px solid #1e2a4a;font-size:12px;color:#505068;font-style:italic}
.ld{text-align:center;padding:60px;color:#505068;font-size:18px}
.nr{text-align:center;padding:40px;color:#505068}
.lb{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:1000;cursor:pointer;justify-content:center;align-items:center}
.lb.on{display:flex}.lb img{max-width:95%;max-height:95%;object-fit:contain}

/* pagination */
.pager{max-width:1100px;margin:0 auto;padding:20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pager button{background:#16213e;border:1px solid #2a2a4e;color:#d0d0d8;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s,border-color .2s}
.pager button:hover{border-color:#c4a35a;background:#1a2848}
.pager button.active{background:#c4a35a;color:#0d0d1a;border-color:#c4a35a;font-weight:600}
</style>
</head>
<body>
<div class="hdr">
<h1>&#9876; Ultima Online Forum Archive &#9876;</h1>
<div class="sub">Gallery View &mdash; threads with image previews</div>
</div>
<div class="nav"><a href="index.html">&#8592; List View</a> <a href="index2.html"><b>Gallery View</b></a></div>
<div id="app"><div class="ld">Loading archive&hellip;</div></div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbi" src=""></div>
<script src="alldata_1.js"></script>
<script src="alldata_2.js"></script>
<script>
if(typeof ALL_THREADS_1==='undefined'||typeof ALL_THREADS_2==='undefined'){
 document.getElementById('app').innerHTML='<div class="ld">alldata files not found.<br><br>Run the scraper first, then open this page.</div>';
}else{

const ALL_THREADS=ALL_THREADS_1.concat(ALL_THREADS_2);
const DB={};
ALL_THREADS.forEach(t=>{DB[t.discussionId]=t});

// build manifest with first image URL
const M=ALL_THREADS.map(t=>{
 let thumb='';
 if(t.posts&&t.posts.length>0){
  const op=t.posts[0];
  if(op.imageUrls&&op.imageUrls.length>0){
   const f=op.imageUrls[0].split('/').pop().split('?')[0];
   thumb='images/'+f;
  }
 }
 return{id:t.discussionId,title:t.title,category:t.category,
  author:t.opAuthor||'',date:t.opDate||'',postCount:t.postCount,thumb:thumb};
});
M.sort((a,b)=>b.id-a.id);

const PER_PAGE=60;
let curPage=1;
let filtered=M;

showList();

function showList(){
 const cats=[...new Set(M.map(t=>t.category))].sort();
 let h='<div class="ctl">';
 h+='<input id="q" placeholder="Search threads\u2026" oninput="fil()">';
 h+='<select id="cf" onchange="fil()"><option value="">All Categories</option>';
 cats.forEach(c=>{h+='<option value="'+esc(c)+'">'+esc(c)+'</option>'});
 h+='</select></div>';
 h+='<div class="st" id="st">'+filtered.length+' threads</div>';
 h+='<div class="grid" id="gc"></div>';
 h+='<div class="pager" id="pager"></div>';
 document.getElementById('app').innerHTML=h;
 renderPage();
 window.showList=showList;window.fil=fil;window.vt=vt;window.goPage=goPage;
}

function renderPage(){
 const start=(curPage-1)*PER_PAGE;
 const slice=filtered.slice(start,start+PER_PAGE);
 let h='';
 slice.forEach(t=>{
  h+='<div class="card" onclick="vt('+t.id+')">';
  h+='<div class="card-thumb">';
  if(t.thumb){
   h+='<img src="'+t.thumb+'" onerror="this.parentElement.innerHTML=\'<div class=no-img>&#9876;</div>\'" loading="lazy">';
  }else{
   h+='<div class="no-img">&#9876;</div>';
  }
  h+='</div>';
  h+='<div class="card-body">';
  h+='<div class="card-title">'+esc(t.title)+'</div>';
  h+='<div class="card-meta">';
  h+='<span>'+esc(t.author)+'</span>';
  h+='<span class="cat">'+esc(t.category)+'</span>';
  h+='<span>'+esc(t.date)+'</span>';
  h+='<span class="posts">'+t.postCount+' posts</span>';
  h+='</div></div></div>';
 });
 document.getElementById('gc').innerHTML=h||'<div class="nr">No threads match.</div>';
 renderPager();
}

function renderPager(){
 const total=Math.ceil(filtered.length/PER_PAGE);
 if(total<=1){document.getElementById('pager').innerHTML='';return}
 let h='';
 // prev
 if(curPage>1) h+='<button onclick="goPage('+(curPage-1)+')">&#9664; Prev</button>';
 // page numbers (show max ~9 around current)
 let s=Math.max(1,curPage-4),e=Math.min(total,curPage+4);
 if(s>1) h+='<button onclick="goPage(1)">1</button>';
 if(s>2) h+='<button disabled>&hellip;</button>';
 for(let i=s;i<=e;i++){
  h+='<button class="'+(i===curPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
 }
 if(e<total-1) h+='<button disabled>&hellip;</button>';
 if(e<total) h+='<button onclick="goPage('+total+')">'+total+'</button>';
 // next
 if(curPage<total) h+='<button onclick="goPage('+(curPage+1)+')">Next &#9654;</button>';
 document.getElementById('pager').innerHTML=h;
}

function goPage(p){curPage=p;renderPage();window.scrollTo(0,0)}

function fil(){
 const q=document.getElementById('q').value.toLowerCase();
 const c=document.getElementById('cf').value;
 filtered=M.filter(t=>{
  if(c&&t.category!==c)return false;
  if(q&&!t.title.toLowerCase().includes(q)&&!t.author.toLowerCase().includes(q))return false;
  return true;
 });
 curPage=1;
 document.getElementById('st').textContent=filtered.length+' of '+M.length+' threads';
 renderPage();
}

function vt(id){
 const t=DB[id];
 if(!t){document.getElementById('app').innerHTML='<div class="ld">Thread '+id+' not found</div>';return}
 let h='<div class="tv">';
 h+='<a class="bb" onclick="showList()">&#8592; Back</a>';
 h+='<h2 class="tvh">'+esc(t.title)+'</h2>';
 h+='<div class="tvc">'+esc(t.category)+' &middot; '+t.postCount+' posts</div>';
 t.posts.forEach(p=>{
  const av=loc(p.avatarUrl),msg=locAll(p.messageHtml||'');
  h+='<div class="post'+(p.isOriginalPost?' op':'')+'">';
  h+='<div class="ph"><img class="pa" src="'+av+'" onerror="this.style.display=\'none\'">';
  h+='<div><div class="pan">'+esc(p.author)+'</div><div class="pad">'+esc(p.datetime||p.displayDate)+'</div></div></div>';
  h+='<div class="pb">'+msg+'</div>';
  if(p.signature)h+='<div class="ps">'+esc(p.signature)+'</div>';
  h+='</div>';
 });
 h+='</div>';
 document.getElementById('app').innerHTML=h;
 document.querySelectorAll('.pb img').forEach(i=>{
  i.style.cursor='pointer';
  i.onclick=()=>{document.getElementById('lbi').src=i.src;document.getElementById('lb').classList.add('on')}
 });
 window.scrollTo(0,0);
}

function locAll(html){
 return html.replace(/src="([^"]+)"/g,(_,u)=>{const f=u.split('/').pop().split('?')[0];return'src="images/'+f+'"'});
}
function loc(u){if(!u)return'';const f=u.split('/').pop().split('?')[0];return'images/'+f}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

}
</script>
</body>
</html>
